name: Starlink MegaCode Runner
on:
  schedule:
    - cron: '0 */6 * * *' # Auto-run every 6 hours
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Deep Scanner
        run: go run main.go

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add cleaned_configs.txt
          git commit -m "Auto-update: High-speed configs [$(date)]" || exit 0
          git push
