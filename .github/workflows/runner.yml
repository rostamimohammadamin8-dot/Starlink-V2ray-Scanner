name: MegaCode Ultra Engine

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: write # Crucial for saving the generated Web App files

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true # Speeds up subsequent runs

      - name: Execute MegaCode Engine
        run: go run main.go
        env:
          # If you added Telegram, put your secrets in Repo Settings > Secrets
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "MegaCode-Bot"
          git config --global user.email "bot@megacode.ultra"
          git add index.html cleaned_configs.txt
          git commit -m "🚀 Ultra UX Update: Nodes Re-Sorted [$(date)]" || echo "No changes to commit"
          git push
