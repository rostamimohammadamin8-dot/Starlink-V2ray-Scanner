name: MegaCode Ultra Engine

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false # Disabled to prevent "Cache folder not found" warnings

      - name: Execute MegaCode Engine
        run: go run main.go

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "MegaCode-Bot"
          git config --global user.email "bot@megacode.ultra"
          git add index.html cleaned_configs.txt
          git commit -m "🚀 Ultra UX Update: Nodes Re-Sorted [$(date)]" || echo "No changes to commit"
          git push
